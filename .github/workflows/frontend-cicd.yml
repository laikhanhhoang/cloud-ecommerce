name: Frontend CI/CD Production

on:
  push:
    branches: [ "main" ] # Tự động deploy khi code push/merge vào main
    paths:
      - 'frontend/**'    # Chỉ chạy khi có thay đổi trong folder frontend
  pull_request:
    branches: [ "main" ] # Chạy kiểm tra (Build) khi có PR vào main
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ GitHub về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Cài đặt thư viện và Build (Bước CI - Kiểm tra lỗi)
      - name: Install & Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # 4. Cấu hình thông tin AWS (Dùng Secrets)
      - name: Configure AWS Credentials
        if: github.event_name == 'push' # Chỉ chạy bước này khi merge vào main (Deploy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5. Đồng bộ lên S3 (Bước CD - Triển khai thực tế)
      - name: Deploy to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync ./frontend/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

      # 6. (Tùy chọn) Xóa Cache CloudFront để cập nhật Web ngay lập tức
      # - name: Invalidate CloudFront
      #   if: github.event_name == 'push'
      #   run: |
      #     aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_ID }} --paths "/*"
