name: Frontend CI/CD Production

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Debug Secrets
        run: |
          echo "KEY=${{ secrets.FRONTEND_AWS_ACCESS_KEY_ID != '' }}"
          echo "SECRET=${{ secrets.FRONTEND_AWS_SECRET_ACCESS_KEY != '' }}"
          echo "REGION=${{ secrets.AWS_REGION != '' }}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.FRONTEND_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.FRONTEND_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync ./frontend/dist s3://${{ secrets.S3_FRONTEND_BUCKET_NAME }} --delete
